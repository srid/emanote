pandoc:
  # Rewrite the class specified in Pandoc's Div and Span nodes. You can specify the class using
  # https://github.com/jgm/commonmark-hs/blob/master/commonmark-extensions/test/attributes.md
  #
  # This feature is useful when managing a "library" of CSS styling to use on
  # Markdown text, especially when using Tailwind.
  rewriteClass:
    # How to style inline tags. Same chip language as wikilinks (see
    # the <Internal> styling in components/pandoc.tpl) so all "linked
    # note / tag" affordances read as one family. Tag-specific styles
    # can be applied as well via emanote:inline-tag:<path>.
    emanote:inline-tag: bg-primary-50/70 dark:bg-primary-950/50 text-primary-600 dark:text-primary-300 font-semibold tracking-tight px-1.5 py-0.5 rounded-sm
    # This style is used by `#a/red/tag` in addition to the generic style above.
    # As this class comes *after* the generic class, it can override the styles
    # in the generic class.
    emanote:inline-tag:a/red/tag: bg-red-50 dark:bg-red-950 text-red-700 dark:text-red-300
    emanote:placeholder-message: text-gray-400 dark:text-gray-500 border-t-2 border-gray-200 dark:border-gray-800 inline-block pt-1
    # Universal marker class for Emanote-emitted diagnostics. Carried by every
    # error block / span on top of its variant class, so any future
    # "diagnostics mode" CSS rule can target [class~="emanote:error"] without
    # touching every trigger site. Variant-specific styling lives in the
    # ":<category>" entries below; this one stays empty so it acts as a pure
    # marker (the mapping must exist for the class to be allow-listed by the
    # rewriteClass pass; mapping it to itself keeps the literal class in the
    # rendered HTML).
    emanote:error: emanote:error
    # YAML / Markdown parse-error banner — built by 'Emanote.Model.Note.errorDiv'
    # via 'Diagnostic.errorBlock "yaml"'. Used for the #285 bad-yaml banner.
    # The same utility-class string powers the Pandoc Lua filter banner
    # ('emanote:error:lua-filter' below) so the two diagnostic surfaces stay
    # visually consistent without duplicating the class list.
    emanote:error:yaml: &emanoteErrorBanner text-sm bg-red-50 dark:bg-red-950 p-3 border-2 border-red-200 dark:border-red-800 m-2 font-mono rounded-lg
    # Block placeholder shown when a note embed (`![[…]]`) would form a cycle —
    # built by 'Renderer.Embed.renderCyclicEmbedSplice' via
    # 'Diagnostic.errorBlock "cyclic-embed"' (#362). Trimmed for inline note flow.
    emanote:error:cyclic-embed: not-prose text-sm bg-red-50 dark:bg-red-950 my-3 px-3 py-2 border-l-4 border-red-500 dark:border-red-400 rounded-r-md text-red-900 dark:text-red-100
    # Pandoc Lua filter banner — used both for catastrophic render-filter
    # failures prepended by 'Emanote.View.Template.prependRenderFilterErrors'
    # (#721) and for per-block engine errors emitted in place by the bundled
    # 'lua-filters/diagram.lua' (#625). Reuses 'emanote:error:yaml''s
    # utility-class string so a tweak to one banner updates both.
    emanote:error:lua-filter: *emanoteErrorBanner
    # You can also add your own class -> style mappings. We provide a sample below.
    sticky-note: px-4 py-3 rounded-lg shadow-md bg-yellow-50 dark:bg-yellow-900 mx-2 transform -skew-y-1 scale-95 hover:scale-100 hover:border-yellow-400 hover:shadow-xl border-l-4 border-yellow-400 mb-8 mt-8 transition-all duration-200
    note: p-4 mb-4 rounded-lg shadow-sm bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-50 w-full float-none md:float-right md:w-1/2 md:clear-both border border-gray-200 dark:border-gray-800
    highlight-block: px-4 py-3 mb-4 rounded-lg bg-primary-50 dark:bg-primary-950 hover:border-primary-400 hover:shadow-md border-l-4 border-primary-400 transition-all duration-200
    highlight-inline: bg-yellow-100 dark:bg-yellow-900 text-yellow-900 dark:text-yellow-100 px-2 py-1 rounded-md
    center: flex justify-center items-center mx-auto

# Put page-specific metadata here. Override them in Markdown frontmatter or
# per-folder YAML as necessary.
page:
  # The URL to the deployed site. Must include everything upto `baseUrl` above.
  siteUrl: ""

  siteTitle: My Emanote Site
  # Desription is expected to be set on a per-page basis.
  # By default, the first paragraph is used for description.
  # Used for https://ogp.me/
  description: ""

  # Language code for the page.
  # https://developer.mozilla.org/en-US/docs/Web/HTML/Global_attributes/lang
  lang: "en"

  # Image URL for previews.
  # By default, the first image URL is used. Note: wikilink are not yet
  # supported.
  # Used for https://ogp.me/
  image: ""

  twitter:
    card: summary_large_image

  # Put anything that should go in <head> of these routes here:
  # You can reference other metadata keys using <snippet var=".." />
  # Or use the JS behaviour library below.
  headHtml: |
    <meta name="generator" content="Emanote" />

  # Put anything that should below the <body> of these routes here:
  # You can reference other metadata keys using <snippet var=".." />
  # Or use the JS behaviour library below.
  bodyHtml: |

# Builtin JS behaviour library. Use them in `page.headHtml` of your .yaml or .md
# frontmatter.
js:
  # Diagrams using mermaid.js
  mermaid: |
    <!-- mermaid.js -->
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
      import elkLayouts from 'https://cdn.jsdelivr.net/npm/@mermaid-js/layout-elk@0/dist/mermaid-layout-elk.esm.min.mjs';
      mermaid.registerLayoutLoaders(elkLayouts);
      const isDarkMode = window.matchMedia('(prefers-color-scheme: dark)').matches;
      mermaid.initialize({
        startOnLoad: false,
        theme: isDarkMode ? 'dark' : 'base'
      });
      mermaid.init(undefined, document.querySelectorAll(".mermaid"));
      
      // Listen for theme changes and reload page (simple approach)
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        window.location.reload();
      });
    </script>
  mathjax: |
    <script>
      window.MathJax = {
        startup: {
          ready: () => {
            MathJax.startup.defaultReady();
          }
        }
      };
    </script>
    <script async="" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

emanote:
  # Whether to automatically treat folder notes as a folgezettel parent of its contents
  # By default, all but top-level folders are treated as folgezettel parents.
  # folder-folgezettel: true
  
  # Enable server-side syntax highlighting using skylighting (default: true)
  # Set to false to use client-side highlighters like highlight.js instead
  syntaxHighlighting: true

  # Render `$...$` / `$$...$$` to MathML at build time via texmath (default: true).
  # Modern browsers render MathML natively (Firefox, Safari, Chrome >=109), so
  # no runtime JS is needed. Set to false to fall back to client-side JS
  # (MathJax snippet, or a custom KaTeX snippet — see docs/tips/js/math).
  staticMath: true
