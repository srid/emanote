  <script>
    // Apply theme before first paint to avoid FOUC. Must run synchronously
    // here (no module loader, no defer) — that's why this is the one
    // theme-related script that doesn't live in _emanote-static/js/.
    // Priority: explicit user choice (localStorage) > OS preference.
    // The 'emanote-theme' key is mirrored by STORAGE_KEY in
    // _emanote-static/js/theme-toggle.js — keep both in sync.
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('emanote-theme'); } catch (e) {}
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var isDark = stored === 'dark' || (stored !== 'light' && prefersDark);
      if (isDark) document.documentElement.classList.add('dark');
      document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
    })();
  </script>

<style data-category='callout'>
  /* To prevent overemphasis of link styles in callout titles */
  .callout .callout-title a {
    color: inherit;
    text-decoration: underline;
  }

  /* Foldable callouts (Obsidian [!type]+ / [!type]-): suppress the native
     <details>/<summary> disclosure marker since we render our own chevron,
     and rotate the chevron based on open state. */
  details.callout-foldable > summary {
    list-style: none;
  }

  details.callout-foldable > summary::-webkit-details-marker {
    display: none;
  }

  details.callout-foldable[open] > summary .callout-fold-marker svg {
    transform: rotate(180deg);
  }

  /* Nested callouts: drop the outer block margin so the inner callout
     hugs the body of its parent rather than introducing a paragraph gap.
     Both foldable (<details>) and non-foldable (<div>) outer callouts wrap
     their body in `.callout-content`, so a single selector covers both. */
  .callout .callout-content > .callout:last-child {
    margin-bottom: 0;
  }
</style>

    <script id='emanote-stork' data-emanote-base-url='/'>
      window.emanote = window.emanote || {};
      window.emanote.stork = {
        searchShown: false,
        indexIsStale: false,
        toggleSearch: function () {
          window.emanote.stork.refreshIndex();
          document.getElementById('stork-search-container').classList.toggle('hidden');
          window.emanote.stork.searchShown = document.body.classList.toggle('stork-overflow-hidden-important');
          if (window.emanote.stork.searchShown) {
            document.getElementById('stork-search-input').focus();
          }
        },
        clearSearch: function () {
          document.getElementById('stork-search-container').classList.add('hidden');
          document.body.classList.remove('stork-overflow-hidden-important');
          window.emanote.stork.searchShown = false;
        },

        getBaseUrl: function () {
          const baseUrl = document.getElementById("emanote-stork").getAttribute('data-emanote-base-url') || '/';
          return baseUrl;
        },

        registerIndex: function (options) {
          const indexName = 'emanote-search'; // used to match input[data-stork] attribute value
          const indexUrl = window.emanote.stork.getBaseUrl() + '-/stork.st';
          stork.register(
            indexName,
            indexUrl,
            options);
        },

        init: function () {
          if (document.readyState !== 'complete') {
            window.addEventListener('load', function () {
              stork.initialize(window.emanote.stork.getBaseUrl() + '_emanote-static/stork/stork.wasm');
              window.emanote.stork.registerIndex();
            });

            document.addEventListener('keydown', event => {
              if (window.emanote.stork.searchShown && event.key === 'Escape') {
                window.emanote.stork.clearSearch();
                event.preventDefault();
              } else if ((event.key == 'k' || event.key == 'K') && (event.ctrlKey || event.metaKey)) {
                window.emanote.stork.toggleSearch();
                event.preventDefault();
              }
            });
          } else {
            // This section is called during Ema's hot reload.
            //
            // Mark the current index as stale, and refresh it *only when* the
            // user actually invokes search.
            //
            // We do not refresh the index *right away*, as that will cause
            // memory leaks in the browser. See
            // https://github.com/srid/emanote/issues/411#issuecomment-1402056235
            console.log("stork: Marking index as stale");
            window.emanote.stork.markIndexAsStale();
          }
        },

        markIndexAsStale: function () {
          window.emanote.stork.indexIsStale = true;
        },

        refreshIndex: function () {
          if (window.emanote.stork.indexIsStale) {
            console.log("stork: Reloading index");
            window.emanote.stork.indexIsStale = false;
            // NOTE: This will leak memory. See the comment above.
            window.emanote.stork.registerIndex({ forceOverwrite: true });
          }
        }

      };

      window.emanote.stork.init();
    </script>

<script>
  // Block-scoped so Ema's reloadScripts can re-execute on route switches
  // without hitting "Identifier 'wrapper' has already been declared".
  {
    const wrapper = document.getElementById('stork-wrapper');
    const applyTheme = () => {
      const isDark = document.documentElement.classList.contains('dark');
      wrapper.classList.remove('stork-wrapper-edible', 'stork-wrapper-edible-dark');
      wrapper.classList.add(isDark ? 'stork-wrapper-edible-dark' : 'stork-wrapper-edible');
    };
    applyTheme();
    // Theme toggle mutates the .dark class on <html>; mirror it onto the
    // stork wrapper so the search dialog re-skins live without a reload.
    new MutationObserver(applyTheme).observe(document.documentElement, {
      attributes: true, attributeFilter: ['class']
    });
  }
</script>
